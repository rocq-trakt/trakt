name: Build Trakt against supported released versions

on:
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Trakt
    secrets: inherit

    uses: rocq-trakt/trakt/.github/workflows/matrix-template.yml@ci-matrix-revdeps
    with:
      repository: .

  build-success:
    if: ${{ always() }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Has the build matrix failed?
        if: ${{ needs.build.result != 'success' }}
        run: exit 1
