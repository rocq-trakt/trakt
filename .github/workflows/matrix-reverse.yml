name: Build Trakt against reverse dependencies

on:
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reverse:
    name: ${{ matrix.name }}
    secrets: inherit

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: SMTCoq
            repository: github:SMTCoq/SMTCoq
            override-input: trakt
          - name: Sniper
            repository: github:SMTCoq/Sniper
            override-input: SMTCoq/trakt

    uses: rocq-trakt/trakt/.github/workflows/matrix-template.yml@ci-matrix-revdeps
    with:
      repository: ${{ matrix.repository }}
      override-input: ${{ matrix.override-input }}

  reverse-success:
    if: ${{ always() }}
    needs: reverse
    runs-on: ubuntu-latest

    steps:
      - name: Has the matrix failed?
        if: ${{ needs.reverse.result != 'success' }}
        run: exit 1
